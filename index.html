<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高爾夫規則速查 / Golf Rules</title>
    <meta name="description" content="點選情境快速查詢高爾夫規則與罰則，依據 R&A/USGA 2023 現行規則">
    <meta name="theme-color" content="#1a5c2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Golf規則">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f7f0;
            min-height: 100vh;
        }
        .header {
            background: #1a5c2a;
            color: white;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        .header-logo { font-size: 2rem; flex-shrink: 0; }
        .header-text { flex: 1; min-width: 0; }
        .header h1 { font-size: 1.05rem; font-weight: 700; }
        .header .subtitle { font-size: 0.68rem; opacity: 0.72; margin-top: 2px; }
        .lang-btn {
            background: rgba(255,255,255,0.18);
            color: white;
            border: 1.5px solid rgba(255,255,255,0.5);
            border-radius: 20px;
            padding: 5px 13px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.05em;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .lang-btn:hover { background: rgba(255,255,255,0.3); }
        .lang-btn:active { background: rgba(255,255,255,0.4); }
        .breadcrumb {
            padding: 9px 16px;
            background: white;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            color: #666;
            overflow-x: auto;
            white-space: nowrap;
        }
        .bc-link { color: #1a5c2a; cursor: pointer; font-weight: 600; }
        .bc-sep { color: #ccc; }
        .main {
            max-width: 620px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }
        .question-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a2e1a;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .options-grid { display: flex; flex-direction: column; gap: 10px; }
        .option-card {
            background: white;
            border: 2px solid #deeede;
            border-radius: 12px;
            padding: 14px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 13px;
            transition: all 0.15s;
        }
        .option-card:hover {
            border-color: #1a5c2a;
            background: #f0f9f0;
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(26,92,42,0.12);
        }
        .option-card:active { transform: translateY(0); }
        .opt-icon { font-size: 1.8rem; flex-shrink: 0; }
        .opt-text h3 { font-size: 0.94rem; font-weight: 600; color: #1a2e1a; }
        .opt-text p { font-size: 0.76rem; color: #777; margin-top: 2px; line-height: 1.4; }
        .opt-arrow { margin-left: auto; color: #bbb; font-size: 1.3rem; flex-shrink: 0; }
        .result-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .result-header { background: #1a5c2a; color: white; padding: 18px 20px; }
        .rule-badge {
            background: rgba(255,255,255,0.18);
            display: inline-block;
            padding: 3px 11px;
            border-radius: 20px;
            font-size: 0.76rem;
            letter-spacing: 0.04em;
            margin-bottom: 8px;
        }
        .result-header h2 { font-size: 1.1rem; font-weight: 700; line-height: 1.35; }
        .penalty-badge {
            display: inline-block;
            background: #e53935;
            color: white;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            margin-top: 11px;
        }
        .penalty-free { background: #388e3c; }
        .result-body { padding: 18px 20px; }
        .summary-text { font-size: 0.91rem; line-height: 1.65; color: #333; margin-bottom: 16px; }
        .stroke-box {
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            margin-bottom: 18px;
        }
        .stroke-box-title { font-size: 0.78rem; opacity: 0.88; margin-bottom: 9px; font-weight: 600; }
        .stroke-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.18);
            font-size: 0.86rem;
        }
        .stroke-row:last-child { border-bottom: none; }
        .stroke-val { font-weight: 700; font-size: 1rem; }
        .section-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #1a5c2a;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 9px;
        }
        .steps { counter-reset: step-counter; list-style: none; margin-bottom: 16px; }
        .steps li {
            counter-increment: step-counter;
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.88rem;
            line-height: 1.55;
            color: #333;
        }
        .steps li::before {
            content: counter(step-counter);
            background: #1a5c2a;
            color: white;
            min-width: 21px;
            height: 21px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .warning-box {
            background: #fff8e1;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 10px 13px;
            font-size: 0.83rem;
            color: #6d4c00;
            display: flex;
            gap: 8px;
            margin-bottom: 13px;
            line-height: 1.5;
        }
        .local-rule-box {
            background: #e3f2fd;
            border: 1px solid #90caf9;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 0.83rem;
            color: #0d47a1;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .local-rule-box strong { display: block; margin-bottom: 4px; font-size: 0.86rem; }
        .btn-row { display: flex; gap: 10px; margin-top: 18px; }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 600;
            transition: opacity 0.15s;
        }
        .btn:active { opacity: 0.8; }
        .btn-primary { background: #1a5c2a; color: white; }
        .btn-secondary { background: #e0ede0; color: #1a3a1a; }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #1a5c2a;
            cursor: pointer;
            font-weight: 600;
            padding: 10px 0 14px;
            font-size: 0.88rem;
        }
        .back-btn:hover { opacity: 0.75; }
        @media (max-width: 400px) {
            .question-title { font-size: 1.05rem; }
            .opt-icon { font-size: 1.55rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo">⛳</div>
    <div class="header-text">
        <h1 id="hd-title">高爾夫規則速查</h1>
        <div class="subtitle" id="hd-sub">依據 R&amp;A / USGA 2023 現行規則</div>
    </div>
    <button class="lang-btn" id="lang-btn" onclick="toggleLang()">EN</button>
</div>

<div class="breadcrumb" id="breadcrumb"></div>
<div class="main" id="app"></div>

<script>
// ─────────────────────────────────────────────
// 語言設定
// ─────────────────────────────────────────────
let lang = localStorage.getItem('golf-lang') || 'zh';

function t(v) {
  if (v && typeof v === 'object' && ('zh' in v || 'en' in v)) return v[lang] || v.zh;
  return v;
}

const UI = {
  title:       { zh: '高爾夫規則速查',               en: 'Golf Rules' },
  subtitle:    { zh: '依據 R&A / USGA 2023 現行規則', en: 'Based on R&A / USGA Rules of Golf 2023' },
  home:        { zh: '首頁',          en: 'Home' },
  back:        { zh: '← 返回上一步', en: '← Back' },
  backShort:   { zh: '← 返回',       en: '← Back' },
  homeBtn:     { zh: '🏠 查詢其他規則', en: '🏠 Other Rules' },
  steps:       { zh: '處理步驟',     en: 'Procedure' },
  defCore:     { zh: '核心定義',     en: 'Definition' },
  defPoints:   { zh: '重點說明',     en: 'Key Points' },
  defMiscon:   { zh: '常見誤解',     en: 'Common Misconception' },
  glossaryBtn: { zh: '📖 其他名詞',  en: '📖 More Terms' },
};

function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('golf-lang', lang);
  document.getElementById('lang-btn').textContent = lang === 'zh' ? 'EN' : '中文';
  document.getElementById('hd-title').textContent = t(UI.title);
  document.getElementById('hd-sub').innerHTML = t(UI.subtitle);
  document.documentElement.lang = lang === 'zh' ? 'zh-TW' : 'en';
  render();
}

function applyLangUI() {
  document.getElementById('lang-btn').textContent = lang === 'zh' ? 'EN' : '中文';
  document.getElementById('hd-title').textContent = t(UI.title);
  document.getElementById('hd-sub').innerHTML = t(UI.subtitle);
  document.documentElement.lang = lang === 'zh' ? 'zh-TW' : 'en';
}

    definition: { zh: '球場正在修繕或暫時不供比賽使用的區域，通常以藍線或「GUR」標示。球落在內或站姿受干擾，可免罰脫困。', en: 'An area of the course under repair or temporarily out of play, usually marked with blue lines or a GUR sign. Free relief is available if the ball lies in GUR or GUR interferes with stance or swing.' },
    details: [
      { zh: '球在 GUR 內，或 GUR 干擾到站姿/揮桿，均可免罰脫困', en: 'Ball in GUR, or GUR interfering with stance or swing — free relief is available' },
      { zh: '球場可設定「強制脫困」GUR（必須移出），或「可選擇」GUR（自行決定）', en: 'The club may designate GUR as mandatory relief (must take relief) or optional relief (player\'s choice)' },
      { zh: '切土痕、草皮坑洞、泥土堆積等也屬於 GUR（即使沒有標示）', en: 'Divot holes, turf repairs, and piled soil also qualify as GUR even without markings' },
    ],
    misconception: { zh: '不是所有 GUR 都強制脫困，需確認當天球場的當地規則。視線被 GUR 阻擋不符合脫困條件，需有實體干擾。', en: 'Not all GUR requires mandatory relief — check the local rules. GUR blocking only your line of sight does not qualify; physical interference with stance or swing is required.' },
  },

  def_acc: {
    type: 'definition', ruleNo: 'Rule 16',
    title: { zh: '異常地面狀況（ACC）', en: 'Abnormal Course Condition' },
    definition: { zh: '四種情況的統稱：①動物洞穴/糞便/足跡、②修繕地區（GUR）、③積水（Temporary Water）、④可移動式障礙物（需聲明）。均可取得免罰脫困。', en: 'A collective term for four conditions: animal holes/droppings/tracks, Ground Under Repair (GUR), Temporary Water, and immovable obstructions. Free relief is available for all.' },
    details: [
      { zh: '積水：下雨或灌溉後地面上可見的臨時積水，不含懲罰區內', en: 'Temporary water: casual water visible on the surface after rain or irrigation — does not include penalty areas' },
      { zh: '動物洞穴：動物挖掘的洞、爪印等——鳥類足跡除外', en: 'Animal holes: holes, footprints, or scrapes made by animals — excludes bird footprints' },
      { zh: '脫困程序統一：找最近完全脫困點（NPCR），在一桿距離內丟球', en: 'Uniform relief procedure: find the Nearest Point of Complete Relief (NPCR), drop within 1 club-length' },
      { zh: '沙坑積水屬於 ACC，但免罰脫困須留在沙坑內', en: 'Standing water in a bunker is ACC, but free relief drop must remain within the bunker' },
    ],
    misconception: { zh: '鞋印（非動物）不屬於 ACC，不能據此取得脫困。積水脫困不能跑到沙坑外（除非整個沙坑都積水，此時可罰 1 桿出沙坑）。', en: 'Human footprints (not animal) do NOT qualify as ACC. Temporary water relief inside a bunker does not allow dropping outside (unless the entire bunker is flooded — then 1-stroke penalty applies).' },
  },

  def_obstruction: {
    type: 'definition', ruleNo: 'Rule 15',
    title: { zh: '障礙物（Obstruction）', en: 'Obstruction' },
    definition: { zh: '球場上人工設置的物體，分為可移動障礙物和不可移動障礙物兩類，處理方式不同。', en: 'Artificial objects on the course, divided into movable and immovable obstructions. Each type is handled differently.' },
    details: [
      { zh: '可移動障礙物（垃圾桶、廣告旗、飲水機等）：直接移走，無罰桿', en: 'Movable obstructions (trash bins, advertising flags, water coolers): remove them — no penalty' },
      { zh: '不可移動障礙物（水泥路、涼亭、固定圍欄、電動車道）：實體干擾站姿/揮桿才能免罰脫困', en: 'Immovable obstructions (paved paths, shelters, fixed fences, cart paths): free relief if physically interfering with stance or swing' },
      { zh: '電動車道屬於不可移動障礙物，球在上面或站姿受干擾可免罰脫困', en: 'Cart paths are immovable obstructions — free relief if the ball lies on the path or it interferes with stance or swing' },
    ],
    misconception: { zh: '不可移動障礙物只擋住「視線」，不符合免罰脫困條件——必須實體干擾到站姿或揮桿動作才行。', en: 'An immovable obstruction that only blocks the LINE OF SIGHT does not qualify for free relief — physical interference with stance or swing is required.' },
  },

  def_loose: {
    type: 'definition', ruleNo: 'Rule 15.1',
    title: { zh: '散置障礙物（Loose Impediment）', en: 'Loose Impediment' },
    definition: { zh: '自然形成的天然物體，可在任何地方（包含沙坑）免費移除。包含石頭、樹葉、樹枝、動物糞便、昆蟲、果實等。', en: 'Natural unattached objects that may be removed anywhere on the course — including bunkers — without penalty. Includes stones, leaves, twigs, animal droppings, insects, and fruit.' },
    details: [
      { zh: '2019 版規則起，沙坑內的石頭、樹葉也可以移除（舊規不可）', en: 'Under the 2019 Rules revision, loose impediments in bunkers (stones, leaves) may be removed — the old rule prohibited this' },
      { zh: '沙子本身不是散置障礙物，不可移動', en: 'Sand itself is not a loose impediment and cannot be moved' },
      { zh: '移除時若球跟著移動，將球放回原位，無罰桿', en: 'If the ball moves when removing a loose impediment, replace the ball in its original position — no penalty' },
      { zh: '露水、仍附在地面上的雜草，不算散置障礙物，不可移除', en: 'Dew and vegetation still attached to the ground are not loose impediments and cannot be removed' },
    ],
    misconception: { zh: '很多球友仍有「沙坑什麼都不能動」的舊觀念，但現行規則沙坑內的散置障礙物可以移除。注意：打球前不可觸碰沙面（測試地面，罰桿）。', en: 'Many players still believe nothing can be moved in a bunker — this is an outdated rule. Current Rules allow removal of loose impediments in bunkers. Note: touching or testing the sand with hands or club before a stroke is still penalized.' },
  },

  def_general_area: {
    type: 'definition', ruleNo: '定義',
    title: { zh: '一般區域（General Area）', en: 'General Area' },
    definition: { zh: '球場上除發球台、果嶺、沙坑、懲罰區以外的所有地方，包含球道、長草區、樹林、車道等。', en: 'All parts of the course except the teeing area, putting green, bunkers, and penalty areas. Includes the fairway, rough, trees, and cart paths.' },
    details: [
      { zh: '球道只是一般區域中修剪較短的草區，並非獨立的規則分類', en: 'The fairway is simply the closely mown portion of the general area — it has no special rules status of its own' },
      { zh: '2019 年改版前稱為「Through the Green」，現已改為「General Area」', en: 'Previously called "Through the Green" before the 2019 Rules revision' },
      { zh: '球在一般區域通常直接打，遇特殊狀況（積水、障礙物）才取得脫困', en: 'A ball in the general area is typically played as it lies; special conditions (water, obstructions) may allow relief' },
    ],
    misconception: { zh: '口語常說「球在球道」或「球在長草」，但規則上這些都統稱一般區域，適用相同的基本規則，不因草的高低有不同待遇。', en: 'Players say "ball is in the fairway" or "in the rough," but under the Rules these are all simply the general area, subject to the same fundamental rules regardless of grass height.' },
  },

  def_wrong_green: {
    type: 'definition', ruleNo: 'Rule 13.1f',
    title: { zh: '錯誤果嶺（Wrong Green）', en: 'Wrong Green' },
    definition: { zh: '比賽洞以外的任何推桿果嶺，包括練習果嶺。球停在上面，或站姿受干擾，必須強制移出，不可選擇留下。', en: 'Any putting green other than the one for the hole being played, including practice putting greens. Mandatory relief is required — the player cannot choose to play from a wrong green.' },
    details: [
      { zh: '強制脫困：不可選擇在原位打，必須移出', en: 'Mandatory relief: the player cannot play from a wrong putting green — must take relief' },
      { zh: '站姿或揮桿路徑被錯誤果嶺干擾，即使球不在上面，也需脫困', en: 'Relief is also required if the wrong green interferes with stance or swing, even if the ball is not on the green itself' },
      { zh: '練習果嶺也算錯誤果嶺，球停上面同樣強制移出', en: 'Practice putting greens are also wrong greens — a ball resting on one must be lifted' },
    ],
    misconception: { zh: '以為只有球停在果嶺上才需脫困。其實站姿受到干擾也必須移出。這是「強制脫困」，沒有選擇留下的權利。', en: 'Relief is required even if the wrong green only interferes with stance — not just when the ball is on it. This is mandatory relief; there is no option to remain.' },
  },

  // ── 球的狀態定義 ──────────────────────────────
  def_ball_inplay: {
    type: 'definition', ruleNo: 'Rule 9',
    title: { zh: '比賽球（Ball in Play）', en: 'Ball in Play' },
    definition: { zh: '從在發球台打出第一桿起，球即為比賽球，直到該洞結束（入洞）或依規定被合法替換/放棄。', en: 'The ball becomes in play once a stroke is made from the teeing area, and remains in play until the hole is completed or replaced under a Rule.' },
    details: [
      { zh: '在發球台揮空未打到球，球還沒成為比賽球——仍可重新放球座調整', en: 'A whiff on the tee counts as 1 stroke but the ball is still in the teeing area and may be re-teed' },
      { zh: '打暫定球期間，原球依然是比賽球，直到確認出界或找不到', en: 'While a provisional ball is being played, the original ball remains the ball in play until confirmed OB or lost' },
      { zh: '比賽球被無故撿起，需放回原位，否則罰 1 桿', en: 'Lifting a ball in play without Rule authorization requires replacing it; failure to do so results in a 1-stroke penalty' },
    ],
    misconception: { zh: '在發球台揮空（沒打到球），球並未成為比賽球，可以重新調整。但若打到球了（哪怕只滾幾公分），球已是比賽球，不可再動。', en: 'On the tee, a ball that falls off before any swing is not in play and may be re-teed freely. But once the ball is struck — even if it only rolls a few centimetres — it is in play.' },
  },

  def_provisional: {
    type: 'definition', ruleNo: 'Rule 18.3',
    title: { zh: '暫定球（Provisional Ball）', en: 'Provisional Ball' },
    definition: { zh: '懷疑原球出界或找不到時，在前往搜尋前打出的第二顆球，目的是節省時間、保持球局順暢。', en: 'A second ball played before searching for an original ball that may be OB or lost, to save time and keep play moving.' },
    details: [
      { zh: '必須在走向原球可能落點「之前」宣告並打出', en: 'Must be announced and played BEFORE walking forward to the area where the original ball may lie' },
      { zh: '宣告方式：向同組球友明確說「我打個暫定球」', en: 'Announcement: clearly inform fellow-competitors — "I am playing a provisional ball"' },
      { zh: '找到原球在界內 → 暫定球作廢，繼續用原球', en: 'Original ball found in bounds → provisional ball is abandoned; must play original ball' },
      { zh: '原球確認出界或 3 分鐘找不到 → 暫定球成為比賽球，加罰 1 桿', en: 'OB confirmed or ball not found within 3 minutes → provisional ball becomes the ball in play, 1-stroke penalty added' },
      { zh: '走到比暫定球更靠近球洞的地方，原球自動視為找不到', en: 'Walking past the point where the provisional ball lies (nearer the hole) automatically deems the original ball lost' },
    ],
    misconception: { zh: '走到原球落點前方後才想打暫定球——已不能打，只能回去重打。另外，打暫定球前若沒有宣告，第二顆球直接成為 Stroke and Distance 的替換球。', en: 'Walking forward past the likely position of the original ball before playing a provisional — it is then too late; must return under stroke and distance. Also, failing to announce before playing makes the second ball an automatic stroke-and-distance replacement.' },
  },

  def_wrong_ball: {
    type: 'definition', ruleNo: 'Rule 6.3c',
    title: { zh: '錯誤球（Wrong Ball）', en: 'Wrong Ball' },
    definition: { zh: '比賽中打了不屬於自己的球，屬於違規，罰 2 桿（比桿賽）。打錯球的那幾桿不計入成績，但罰桿要加計。', en: 'Playing a ball other than your own during a hole. 2-stroke penalty in stroke play. Strokes made with the wrong ball do not count, but the 2-stroke penalty is added.' },
    details: [
      { zh: '打錯球後：立即停止，找到自己的球從原位繼續打', en: 'After playing a wrong ball: stop immediately, find your own ball and play it from its original position' },
      { zh: '若自己的球找不到，另依「球找不到」的規則處理（再加 1 桿罰則）', en: 'If your own ball cannot be found, apply the lost ball rule — an additional 1-stroke penalty applies' },
      { zh: '比洞賽：打錯球輸一洞（立即效力）', en: 'Match play: loss of hole — immediate effect' },
    ],
    misconception: { zh: '打錯球的桿數也要算——錯！只有 2 桿罰桿，打錯球的那幾桿不計入成績。預防：開球前在球上做個人識別記號。', en: 'The strokes made WITH the wrong ball also count toward score — WRONG. Only the 2-stroke penalty counts; strokes played with the wrong ball are disregarded. Prevention: always mark your ball with a personal identification mark.' },
  },

  def_substituted: {
    type: 'definition', ruleNo: 'Rule 14.3',
    title: { zh: '替換球（Substituted Ball）', en: 'Substituted Ball' },
    definition: { zh: '在規則允許的情況下，以另一顆球替換原來的比賽球。未經規則允許不可任意替換。', en: 'Replacing the ball in play with a different ball under a Rule. Substitution is only permitted in specific Rule-defined situations.' },
    details: [
      { zh: '合法替換：球損壞（切口或裂開，非一般磨損）、OB/找不到脫困、嵌入球脫困等', en: 'Permitted substitutions: ball cut or cracked (not surface marks), OB or lost ball relief, embedded ball relief, etc.' },
      { zh: '不可任意換球：球被泥土弄髒，果嶺外不能據此換球', en: 'Not permitted: ball covered in mud outside the putting green — this alone does not allow substitution' },
      { zh: '在不允許情況下替換，罰 1 桿，但必須繼續用新球（不回頭用舊球）', en: 'Substituting when not permitted: 1-stroke penalty; must continue with the substituted ball — cannot revert to the original' },
    ],
    misconception: { zh: '以為球被泥土弄髒可以換球——果嶺外的球不能因此替換（果嶺上可以擦拭）。只有規則明確允許的情況才能替換球。', en: 'A mud-covered ball CANNOT be substituted outside the putting green (it may be cleaned on the green). Only Rule-permitted situations allow substitution.' },
  },

  def_identify: {
    type: 'definition', ruleNo: 'Rule 7.2',
    title: { zh: '球的識別（Ball Identification）', en: 'Ball Identification' },
    definition: { zh: '確認某顆球是否為自己比賽球的觀念與責任。打球前確認球身份是球員的義務。', en: 'The concept and responsibility of knowing which ball is yours. A player has a duty to identify their ball before playing it.' },
    details: [
      { zh: '強烈建議在球上做個人識別標記（用筆畫點或線），品牌/號碼相同的球非常多', en: 'Always recommended: mark your ball with a personal identification mark (dot or line) — brand and number alone are often not unique enough' },
      { zh: '搜尋時限 3 分鐘，從「開始積極搜尋」起算（不是從落點時起算）', en: '3-minute search time limit, starting from when the player begins actively searching — not from when the ball was struck' },
      { zh: '超過 3 分鐘找到的球也不能用，球視為丟失', en: 'A ball found after the 3-minute limit cannot be played — it is deemed lost' },
      { zh: '無法識別球的身份 → 視為找不到，適用一桿距離罰則', en: 'Unable to identify the ball → treat as lost; stroke and distance applies' },
    ],
    misconception: { zh: '以為「看起來像自己的球」就可以打——若無法明確識別（沒有個人標記、品牌號碼相同），不能打那顆球。', en: 'Thinking a ball looks like yours is not sufficient — if you cannot positively identify it (no personal mark, same brand and number as others), you may not play it.' },
  },

  // ── 脫困術語定義 ──────────────────────────────
  def_npcr: {
    type: 'definition', ruleNo: 'Rule 14.3',
    title: { zh: '最近完全脫困點（NPCR）', en: 'Nearest Point of Complete Relief' },
    definition: { zh: '在需要免罰脫困時，距離原球最近、完全不受干擾的點，且此點不能比原球更靠近球洞。', en: 'When taking free relief, the closest point — no nearer to the hole — where there is complete relief from the condition requiring relief.' },
    details: [
      { zh: '「完全脫困」意指站姿和揮桿路徑都不受干擾，不只是球的位置', en: '"Complete relief" means both stance AND the area of intended swing are clear — not just the ball position' },
      { zh: '脫困點可能在長草或不利位置，球員無權選擇「更好的位置」', en: 'The NPCR may be in thick rough or an otherwise unfavorable position — the player has no right to choose a better spot' },
      { zh: '找到 NPCR 後，在 NPCR 起一桿距離內丟球（同樣不更靠近球洞）', en: 'Once the NPCR is found, drop within 1 club-length of that point — also not nearer the hole' },
      { zh: '建議用球桿模擬站姿和揮桿動作，確認真正完全不受干擾的位置', en: 'Recommended: physically simulate your stance and swing with a club to confirm the point truly provides complete relief' },
    ],
    misconception: { zh: '很多球友以為免罰脫困可以選「最有利的位置」，但規則要求找最近的完全脫困點，就算那個點在長草也一樣。', en: 'Many players assume free relief means choosing the most ADVANTAGEOUS position. The Rules require the NEAREST point of complete relief — even if that point is in thick rough.' },
  },

  def_1club: {
    type: 'definition', ruleNo: 'Rule 14.3',
    title: { zh: '一桿距離（One Club-Length）', en: 'One Club-Length' },
    definition: { zh: '以球員球包內最長的球桿（通常是球道木）量測的距離，作為丟球區域的範圍。以脫困點為圓心，最長球桿為半徑的圓形範圍。', en: 'The length of the longest club in the player\'s bag (usually a fairway wood), used to define the permitted drop zone — a circle with the reference point as center.' },
    details: [
      { zh: '用包包裡最長的球桿量，量完後可換任何球桿打', en: 'Use the longest club in the bag to measure; any club may be used to play the shot afterward' },
      { zh: '丟球後，球必須靜止在此圓形範圍內，且不更靠近球洞', en: 'After dropping, the ball must come to rest within the circle and must not be nearer the hole' },
      { zh: '若球滾出範圍，需重丟（最多兩次機會）', en: 'If the ball rolls outside the circle, re-drop — up to two attempts' },
    ],
    misconception: { zh: '以為要用推桿量，或以為一桿距離是固定的長度。應用包包裡最長的球桿，每個人不一樣長。', en: 'Many players assume one club-length means a putter length, or think it is a fixed standard distance. Use the longest club in your bag — this varies from player to player.' },
  },

  def_2club: {
    type: 'definition', ruleNo: 'Rule 14.3',
    title: { zh: '兩桿距離（Two Club-Lengths）', en: 'Two Club-Lengths' },
    definition: { zh: '以最長球桿量取兩倍的距離，適用於紅樁側邊脫困、Unplayable 的兩桿距離選項等情況。', en: 'Twice the length of the longest club in the bag. Used for lateral relief from red-stake penalty areas and the 2-club-length unplayable option.' },
    details: [
      { zh: '同樣以包包裡最長的球桿為準，量兩次', en: 'Use the longest club in the bag, measured twice' },
      { zh: '適用情況：紅樁懲罰區側邊丟球、無法打擊（Unplayable）的兩桿距離選項', en: 'Applicable situations: lateral drop from a red-stake penalty area; 2-club-length unplayable relief option' },
      { zh: '同樣不可更靠近球洞，球靜止後需在圓形範圍內', en: 'Same rules apply: ball must not be nearer the hole and must come to rest within the drop zone' },
    ],
    misconception: { zh: '兩桿距離同樣不可更靠近球洞，這一點和一桿距離相同，很多球友容易忽略。', en: 'Even with two club-lengths, the ball must NOT be nearer the hole — identical to the one club-length rule, yet often overlooked.' },
  },

  def_backline: {
    type: 'definition', ruleNo: 'Rule 14.3',
    title: { zh: '後方延伸線（Back-on-the-Line）', en: 'Back-on-the-Line Relief' },
    definition: { zh: '以球洞和基準點（如球入水點）連線，向基準點後方無限延伸的一條線。可在線上任意一點丟球，無距離限制。', en: 'A line extending backward from the hole through a reference point (e.g., where the ball last crossed a penalty area margin). The player may drop anywhere on this line — no distance limit.' },
    details: [

// ─────────────────────────────────────────────
// 應用程式邏輯
// ─────────────────────────────────────────────
let history = [{ id: 'home' }];

function goHome() {
  history = [{ id: 'home' }];
  render();
}

function goBack() {
  if (history.length > 1) { history.pop(); render(); }
}

function jumpTo(idx) {
  history = history.slice(0, idx + 1);
  render();
}

function navigate(id) {
  history.push({ id });
  render();
}

function getBreadcrumbLabel(id, idx) {
  if (idx === 0) return t(UI.home);
  // find the option in the parent node
  const parentId = history[idx - 1].id;
  const parent = TREE[parentId];
  if (parent && parent.options) {
    const opt = parent.options.find(o => o.id === id);
    if (opt) return t(opt.label);
  }
  return id;
}

function render() {
  const cur = history[history.length - 1];
  const node = TREE[cur.id];
  if (!node) return;

  // breadcrumb
  document.getElementById('breadcrumb').innerHTML =
    history.map((h, i) => {
      const rawLabel = getBreadcrumbLabel(h.id, i);
      const label = rawLabel.length > 14 ? rawLabel.slice(0, 14) + '…' : rawLabel;
      if (i === 0) return `<span class="bc-link" onclick="goHome()">${label}</span>`;
      if (i === history.length - 1) return `<span class="bc-sep">›</span><span style="color:#333">${label}</span>`;
      return `<span class="bc-sep">›</span><span class="bc-link" onclick="jumpTo(${i})">${label}</span>`;
    }).join('');

  const app = document.getElementById('app');

  if (node.type === 'question') {
    app.innerHTML = `
      ${history.length > 1 ? `<div class="back-btn" onclick="goBack()">${t(UI.back)}</div>` : ''}
      <div class="question-title">${t(node.title)}</div>
      <div class="options-grid">
        ${node.options.map((o, i) => `
          ${cur.id === 'home' && i === 9 ? '<div style="margin:4px 0;border-top:1.5px dashed #c8e0c8;"></div>' : ''}
          <div class="option-card" onclick="navigate('${o.id}')">
            <div class="opt-icon">${o.icon}</div>
            <div class="opt-text">
              <h3>${t(o.label)}</h3>
              ${o.desc ? `<p>${t(o.desc)}</p>` : ''}
            </div>
            <div class="opt-arrow">›</div>
          </div>`).join('')}
      </div>`;

  } else if (node.type === 'definition') {
    app.innerHTML = `
      <div class="back-btn" onclick="goBack()">${t(UI.back)}</div>
      <div class="result-card">
        <div class="result-header">
          <div class="rule-badge">${node.ruleNo}</div>
          <h2>${t(node.title)}</h2>
        </div>
        <div class="result-body">
          <div class="section-label">${t(UI.defCore)}</div>
          <p class="summary-text">${t(node.definition)}</p>

          ${node.details && node.details.length ? `
          <div class="section-label">${t(UI.defPoints)}</div>
          <ol class="steps">
            ${node.details.map(d => `<li>${t(d)}</li>`).join('')}
          </ol>` : ''}

          ${node.misconception ? `
          <div class="warning-box">
            <span>💡</span><span><strong>${t(UI.defMiscon)}：</strong>${t(node.misconception)}</span>
          </div>` : ''}

          <div class="btn-row">
            <button class="btn btn-secondary" onclick="goBack()">${t(UI.backShort)}</button>
            <button class="btn btn-primary" onclick="navigate('defs')">${t(UI.glossaryBtn)}</button>
          </div>
        </div>
      </div>`;

  } else if (node.type === 'result') {
    const sc = node.strokeCalc;
    app.innerHTML = `
      <div class="back-btn" onclick="goBack()">${t(UI.back)}</div>
      <div class="result-card">
        <div class="result-header">
          <div class="rule-badge">${node.ruleNo}</div>
          <h2>${t(node.title)}</h2>
          <div class="penalty-badge ${node.penaltyFree ? 'penalty-free' : ''}">
            ${node.penaltyFree ? '✅' : '⚠️'} ${t(node.penalty)}
          </div>
        </div>
        <div class="result-body">
          <p class="summary-text">${t(node.summary)}</p>

          ${sc ? `
          <div class="stroke-box">
            <div class="stroke-box-title">🧮 ${t(sc.title)}</div>
            ${sc.rows.map(r => `
              <div class="stroke-row">
                <span>${t(r.label)}</span>
                <span class="stroke-val">${t(r.val)}</span>
              </div>`).join('')}
          </div>` : ''}

          <div class="section-label">${t(UI.steps)}</div>
          <ol class="steps">
            ${node.steps.map(s => `<li>${t(s)}</li>`).join('')}
          </ol>

          ${node.warning ? `
          <div class="warning-box">
            <span>⚠️</span><span>${t(node.warning)}</span>
          </div>` : ''}

          ${node.localRule ? `
          <div class="local-rule-box">
            <strong>📋 ${t(node.localRule.title)}</strong>
            ${t(node.localRule.desc)}
          </div>` : ''}

          <div class="btn-row">
            <button class="btn btn-secondary" onclick="goBack()">${t(UI.backShort)}</button>
            <button class="btn btn-primary" onclick="goHome()">${t(UI.homeBtn)}</button>
          </div>
        </div>
      </div>`;
  }
}

applyLangUI();
render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
</body>
</html>
