<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高爾夫規則速查</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f7f0;
            min-height: 100vh;
        }
        .header {
            background: #1a5c2a;
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        .header-logo { font-size: 2.2rem; }
        .header h1 { font-size: 1.15rem; font-weight: 700; }
        .header .subtitle { font-size: 0.72rem; opacity: 0.75; margin-top: 2px; }
        .breadcrumb {
            padding: 10px 20px;
            background: white;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            color: #666;
            overflow-x: auto;
            white-space: nowrap;
        }
        .bc-link { color: #1a5c2a; cursor: pointer; font-weight: 600; }
        .bc-sep { color: #ccc; }
        .main {
            max-width: 620px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }
        .question-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1a2e1a;
            margin-bottom: 18px;
            line-height: 1.4;
        }
        .options-grid { display: flex; flex-direction: column; gap: 11px; }
        .option-card {
            background: white;
            border: 2px solid #deeede;
            border-radius: 12px;
            padding: 15px 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.15s;
        }
        .option-card:hover {
            border-color: #1a5c2a;
            background: #f0f9f0;
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(26,92,42,0.12);
        }
        .option-card:active { transform: translateY(0); }
        .opt-icon { font-size: 1.9rem; flex-shrink: 0; }
        .opt-text h3 { font-size: 0.97rem; font-weight: 600; color: #1a2e1a; }
        .opt-text p { font-size: 0.78rem; color: #777; margin-top: 2px; }
        .opt-arrow { margin-left: auto; color: #bbb; font-size: 1.3rem; flex-shrink: 0; }
        /* Result */
        .result-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .result-header { background: #1a5c2a; color: white; padding: 20px; }
        .rule-badge {
            background: rgba(255,255,255,0.18);
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            letter-spacing: 0.04em;
            margin-bottom: 9px;
        }
        .result-header h2 { font-size: 1.2rem; font-weight: 700; line-height: 1.35; }
        .penalty-badge {
            display: inline-block;
            background: #e53935;
            color: white;
            padding: 7px 18px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            margin-top: 12px;
        }
        .penalty-free {
            background: #388e3c;
        }
        .result-body { padding: 20px; }
        .summary-text { font-size: 0.93rem; line-height: 1.65; color: #333; margin-bottom: 18px; }
        .stroke-box {
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            border-radius: 12px;
            padding: 16px;
            color: white;
            margin-bottom: 20px;
        }
        .stroke-box-title { font-size: 0.8rem; opacity: 0.88; margin-bottom: 10px; font-weight: 600; }
        .stroke-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.18);
            font-size: 0.88rem;
        }
        .stroke-row:last-child { border-bottom: none; }
        .stroke-val { font-weight: 700; font-size: 1.05rem; }
        .section-label {
            font-size: 0.78rem;
            font-weight: 700;
            color: #1a5c2a;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 10px;
        }
        .steps { counter-reset: step-counter; list-style: none; margin-bottom: 18px; }
        .steps li {
            counter-increment: step-counter;
            display: flex;
            gap: 11px;
            margin-bottom: 11px;
            font-size: 0.9rem;
            line-height: 1.55;
            color: #333;
        }
        .steps li::before {
            content: counter(step-counter);
            background: #1a5c2a;
            color: white;
            min-width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .warning-box {
            background: #fff8e1;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 0.84rem;
            color: #6d4c00;
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            line-height: 1.5;
        }
        .local-rule-box {
            background: #e3f2fd;
            border: 1px solid #90caf9;
            border-radius: 8px;
            padding: 13px 15px;
            font-size: 0.85rem;
            color: #0d47a1;
            margin-bottom: 18px;
            line-height: 1.5;
        }
        .local-rule-box strong { display: block; margin-bottom: 5px; font-size: 0.88rem; }
        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn {
            flex: 1;
            padding: 13px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: opacity 0.15s;
        }
        .btn:active { opacity: 0.8; }
        .btn-primary { background: #1a5c2a; color: white; }
        .btn-secondary { background: #e0ede0; color: #1a3a1a; }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #1a5c2a;
            cursor: pointer;
            font-weight: 600;
            padding: 10px 0 16px;
            font-size: 0.9rem;
        }
        .back-btn:hover { opacity: 0.75; }
        @media (max-width: 400px) {
            .question-title { font-size: 1.1rem; }
            .opt-icon { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo">⛳</div>
    <div>
        <h1>高爾夫規則速查</h1>
        <div class="subtitle">依據 R&amp;A / USGA 2023 現行規則</div>
    </div>
</div>

<div class="breadcrumb" id="breadcrumb"></div>

<div class="main" id="app"></div>

// ─────────────────────────────────────────────
// 應用程式邏輯
// ─────────────────────────────────────────────
let history = [{ id: 'home', label: '首頁' }];

function goHome() {
  history = [{ id: 'home', label: '首頁' }];
  render();
}

function goBack() {
  if (history.length > 1) { history.pop(); render(); }
}

function jumpTo(idx) {
  history = history.slice(0, idx + 1);
  render();
}

function navigate(id, label) {
  history.push({ id, label });
  render();
}

function render() {
  const cur = history[history.length - 1];
  const node = TREE[cur.id];
  if (!node) return;

  // --- breadcrumb ---
  document.getElementById('breadcrumb').innerHTML =
    history.map((h, i) => {
      if (i === 0) return `<span class="bc-link" onclick="goHome()">首頁</span>`;
      const label = h.label.length > 12 ? h.label.slice(0, 12) + '…' : h.label;
      if (i === history.length - 1) return `<span class="bc-sep">›</span><span style="color:#333">${label}</span>`;
      return `<span class="bc-sep">›</span><span class="bc-link" onclick="jumpTo(${i})">${label}</span>`;
    }).join('');

  // --- main content ---
  const app = document.getElementById('app');

  if (node.type === 'question') {
    app.innerHTML = `
      ${history.length > 1 ? `<div class="back-btn" onclick="goBack()">← 返回上一步</div>` : ''}
      <div class="question-title">${node.title}</div>
      <div class="options-grid">
        ${node.options.map(o => `
          <div class="option-card" onclick="navigate('${o.id}', '${o.label}')">
            <div class="opt-icon">${o.icon}</div>
            <div class="opt-text">
              <h3>${o.label}</h3>
              ${o.desc ? `<p>${o.desc}</p>` : ''}
            </div>
            <div class="opt-arrow">›</div>
          </div>
        `).join('')}
      </div>`;

  } else if (node.type === 'result') {
    const sc = node.strokeCalc;
    app.innerHTML = `
      <div class="back-btn" onclick="goBack()">← 返回上一步</div>
      <div class="result-card">
        <div class="result-header">
          <div class="rule-badge">${node.ruleNo}</div>
          <h2>${node.title}</h2>
          <div class="penalty-badge ${node.penaltyFree ? 'penalty-free' : ''}">
            ${node.penaltyFree ? '✅' : '⚠️'} ${node.penalty}
          </div>
        </div>
        <div class="result-body">
          <p class="summary-text">${node.summary}</p>

          ${sc ? `
          <div class="stroke-box">
            <div class="stroke-box-title">🧮 ${sc.title}</div>
            ${sc.rows.map(r => `
              <div class="stroke-row">
                <span>${r.label}</span>
                <span class="stroke-val">${r.val}</span>
              </div>`).join('')}
          </div>` : ''}

          <div class="section-label">處理步驟</div>
          <ol class="steps">
            ${node.steps.map(s => `<li>${s}</li>`).join('')}
          </ol>

          ${node.warning ? `
          <div class="warning-box">
            <span>⚠️</span><span>${node.warning}</span>
          </div>` : ''}

          ${node.localRule ? `
          <div class="local-rule-box">
            <strong>📋 ${node.localRule.title}</strong>
            ${node.localRule.desc}
          </div>` : ''}

          <div class="btn-row">
            <button class="btn btn-secondary" onclick="goBack()">← 返回</button>
            <button class="btn btn-primary" onclick="goHome()">🏠 查詢其他規則</button>
          </div>
        </div>
      </div>`;
  }
}

render();
</script>
