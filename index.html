<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高爾夫規則速查 / Golf Rules</title>
    <meta name="description" content="點選情境快速查詢高爾夫規則與罰則，依據 R&A/USGA 2023 現行規則">
    <meta name="theme-color" content="#1a5c2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Golf規則">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f7f0;
            min-height: 100vh;
        }
        .header {
            background: #1a5c2a;
            color: white;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        }
        .header-logo { font-size: 2rem; flex-shrink: 0; }
        .header-text { flex: 1; min-width: 0; }
        .header h1 { font-size: 1.05rem; font-weight: 700; }
        .header .subtitle { font-size: 0.68rem; opacity: 0.72; margin-top: 2px; }
        .lang-btn {
            background: rgba(255,255,255,0.18);
            color: white;
            border: 1.5px solid rgba(255,255,255,0.5);
            border-radius: 20px;
            padding: 5px 13px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.05em;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .lang-btn:hover { background: rgba(255,255,255,0.3); }
        .lang-btn:active { background: rgba(255,255,255,0.4); }
        .breadcrumb {
            padding: 9px 16px;
            background: white;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            color: #666;
            overflow-x: auto;
            white-space: nowrap;
        }
        .bc-link { color: #1a5c2a; cursor: pointer; font-weight: 600; }
        .bc-sep { color: #ccc; }
        .main {
            max-width: 620px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }
        .question-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a2e1a;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .options-grid { display: flex; flex-direction: column; gap: 10px; }
        .option-card {
            background: white;
            border: 2px solid #deeede;
            border-radius: 12px;
            padding: 14px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 13px;
            transition: all 0.15s;
        }
        .option-card:hover {
            border-color: #1a5c2a;
            background: #f0f9f0;
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(26,92,42,0.12);
        }
        .option-card:active { transform: translateY(0); }
        .opt-icon { font-size: 1.8rem; flex-shrink: 0; }
        .opt-text h3 { font-size: 0.94rem; font-weight: 600; color: #1a2e1a; }
        .opt-text p { font-size: 0.76rem; color: #777; margin-top: 2px; line-height: 1.4; }
        .opt-arrow { margin-left: auto; color: #bbb; font-size: 1.3rem; flex-shrink: 0; }
        .result-card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .result-header { background: #1a5c2a; color: white; padding: 18px 20px; }
        .rule-badge {
            background: rgba(255,255,255,0.18);
            display: inline-block;
            padding: 3px 11px;
            border-radius: 20px;
            font-size: 0.76rem;
            letter-spacing: 0.04em;
            margin-bottom: 8px;
        }
        .result-header h2 { font-size: 1.1rem; font-weight: 700; line-height: 1.35; }
        .penalty-badge {
            display: inline-block;
            background: #e53935;
            color: white;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            margin-top: 11px;
        }
        .penalty-free { background: #388e3c; }
        .result-body { padding: 18px 20px; }
        .summary-text { font-size: 0.91rem; line-height: 1.65; color: #333; margin-bottom: 16px; }
        .stroke-box {
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            margin-bottom: 18px;
        }
        .stroke-box-title { font-size: 0.78rem; opacity: 0.88; margin-bottom: 9px; font-weight: 600; }
        .stroke-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.18);
            font-size: 0.86rem;
        }
        .stroke-row:last-child { border-bottom: none; }
        .stroke-val { font-weight: 700; font-size: 1rem; }
        .section-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #1a5c2a;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 9px;
        }
        .steps { counter-reset: step-counter; list-style: none; margin-bottom: 16px; }
        .steps li {
            counter-increment: step-counter;
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.88rem;
            line-height: 1.55;
            color: #333;
        }
        .steps li::before {
            content: counter(step-counter);
            background: #1a5c2a;
            color: white;
            min-width: 21px;
            height: 21px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .warning-box {
            background: #fff8e1;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 10px 13px;
            font-size: 0.83rem;
            color: #6d4c00;
            display: flex;
            gap: 8px;
            margin-bottom: 13px;
            line-height: 1.5;
        }
        .local-rule-box {
            background: #e3f2fd;
            border: 1px solid #90caf9;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 0.83rem;
            color: #0d47a1;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .local-rule-box strong { display: block; margin-bottom: 4px; font-size: 0.86rem; }
        .btn-row { display: flex; gap: 10px; margin-top: 18px; }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 600;
            transition: opacity 0.15s;
        }
        .btn:active { opacity: 0.8; }
        .btn-primary { background: #1a5c2a; color: white; }
        .btn-secondary { background: #e0ede0; color: #1a3a1a; }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #1a5c2a;
            cursor: pointer;
            font-weight: 600;
            padding: 10px 0 14px;
            font-size: 0.88rem;
        }
        .back-btn:hover { opacity: 0.75; }
        @media (max-width: 400px) {
            .question-title { font-size: 1.05rem; }
            .opt-icon { font-size: 1.55rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo">⛳</div>
    <div class="header-text">
        <h1 id="hd-title">高爾夫規則速查</h1>
        <div class="subtitle" id="hd-sub">依據 R&amp;A / USGA 2023 現行規則</div>
    </div>
    <button class="lang-btn" id="lang-btn" onclick="toggleLang()">EN</button>
</div>

<div class="breadcrumb" id="breadcrumb"></div>
<div class="main" id="app"></div>

<script>
// ─────────────────────────────────────────────
// 語言設定
// ─────────────────────────────────────────────
let lang = localStorage.getItem('golf-lang') || 'zh';

function t(v) {
  if (v && typeof v === 'object' && ('zh' in v || 'en' in v)) return v[lang] ?? v.zh;
  return v;
}

const UI = {
  title:       { zh: '高爾夫規則速查',               en: 'Golf Rules' },
  subtitle:    { zh: '依據 R&A / USGA 2023 現行規則', en: 'Based on R&A / USGA Rules of Golf 2023' },
  home:        { zh: '首頁',          en: 'Home' },
  back:        { zh: '← 返回上一步', en: '← Back' },
  backShort:   { zh: '← 返回',       en: '← Back' },
  homeBtn:     { zh: '🏠 查詢其他規則', en: '🏠 Other Rules' },
  steps:       { zh: '處理步驟',     en: 'Procedure' },
  defCore:     { zh: '核心定義',     en: 'Definition' },
  defPoints:   { zh: '重點說明',     en: 'Key Points' },
  defMiscon:   { zh: '常見誤解',     en: 'Common Misconception' },
  glossaryBtn: { zh: '📖 其他名詞',  en: '📖 More Terms' },
};

function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('golf-lang', lang);
  document.getElementById('lang-btn').textContent = lang === 'zh' ? 'EN' : '中文';
  document.getElementById('hd-title').textContent = t(UI.title);
  document.getElementById('hd-sub').innerHTML = t(UI.subtitle);
  document.documentElement.lang = lang === 'zh' ? 'zh-TW' : 'en';
  render();
}

function applyLangUI() {
  document.getElementById('lang-btn').textContent = lang === 'zh' ? 'EN' : '中文';
  document.getElementById('hd-title').textContent = t(UI.title);
  document.getElementById('hd-sub').innerHTML = t(UI.subtitle);
  document.documentElement.lang = lang === 'zh' ? 'zh-TW' : 'en';
}

// ─────────────────────────────────────────────
// 應用程式邏輯
// ─────────────────────────────────────────────
let history = [{ id: 'home' }];

function goHome() {
  history = [{ id: 'home' }];
  render();
}

function goBack() {
  if (history.length > 1) { history.pop(); render(); }
}

function jumpTo(idx) {
  history = history.slice(0, idx + 1);
  render();
}

function navigate(id) {
  history.push({ id });
  render();
}

function getBreadcrumbLabel(id, idx) {
  if (idx === 0) return t(UI.home);
  // find the option in the parent node
  const parentId = history[idx - 1].id;
  const parent = TREE[parentId];
  if (parent && parent.options) {
    const opt = parent.options.find(o => o.id === id);
    if (opt) return t(opt.label);
  }
  return id;
}

function render() {
  const cur = history[history.length - 1];
  const node = TREE[cur.id];
  if (!node) return;

  // breadcrumb
  document.getElementById('breadcrumb').innerHTML =
    history.map((h, i) => {
      const rawLabel = getBreadcrumbLabel(h.id, i);
      const label = rawLabel.length > 14 ? rawLabel.slice(0, 14) + '…' : rawLabel;
      if (i === 0) return `<span class="bc-link" onclick="goHome()">${label}</span>`;
      if (i === history.length - 1) return `<span class="bc-sep">›</span><span style="color:#333">${label}</span>`;
      return `<span class="bc-sep">›</span><span class="bc-link" onclick="jumpTo(${i})">${label}</span>`;
    }).join('');

  const app = document.getElementById('app');

  if (node.type === 'question') {
    app.innerHTML = `
      ${history.length > 1 ? `<div class="back-btn" onclick="goBack()">${t(UI.back)}</div>` : ''}
      <div class="question-title">${t(node.title)}</div>
      <div class="options-grid">
        ${node.options.map((o, i) => `
          ${cur.id === 'home' && i === 7 ? '<div style="margin:4px 0;border-top:1.5px dashed #c8e0c8;"></div>' : ''}
          <div class="option-card" onclick="navigate('${o.id}')">
            <div class="opt-icon">${o.icon}</div>
            <div class="opt-text">
              <h3>${t(o.label)}</h3>
              ${o.desc ? `<p>${t(o.desc)}</p>` : ''}
            </div>
            <div class="opt-arrow">›</div>
          </div>`).join('')}
      </div>`;

  } else if (node.type === 'definition') {
    app.innerHTML = `
      <div class="back-btn" onclick="goBack()">${t(UI.back)}</div>
      <div class="result-card">
        <div class="result-header">
          <div class="rule-badge">${node.ruleNo}</div>
          <h2>${t(node.title)}</h2>
        </div>
        <div class="result-body">
          <div class="section-label">${t(UI.defCore)}</div>
          <p class="summary-text">${t(node.definition)}</p>

          ${node.details && node.details.length ? `
          <div class="section-label">${t(UI.defPoints)}</div>
          <ol class="steps">
            ${node.details.map(d => `<li>${t(d)}</li>`).join('')}
          </ol>` : ''}

          ${node.misconception ? `
          <div class="warning-box">
            <span>💡</span><span><strong>${t(UI.defMiscon)}：</strong>${t(node.misconception)}</span>
          </div>` : ''}

          <div class="btn-row">
            <button class="btn btn-secondary" onclick="goBack()">${t(UI.backShort)}</button>
            <button class="btn btn-primary" onclick="navigate('defs')">${t(UI.glossaryBtn)}</button>
          </div>
        </div>
      </div>`;

  } else if (node.type === 'result') {
    const sc = node.strokeCalc;
    app.innerHTML = `
      <div class="back-btn" onclick="goBack()">${t(UI.back)}</div>
      <div class="result-card">
        <div class="result-header">
          <div class="rule-badge">${node.ruleNo}</div>
          <h2>${t(node.title)}</h2>
          <div class="penalty-badge ${node.penaltyFree ? 'penalty-free' : ''}">
            ${node.penaltyFree ? '✅' : '⚠️'} ${t(node.penalty)}
          </div>
        </div>
        <div class="result-body">
          <p class="summary-text">${t(node.summary)}</p>

          ${sc ? `
          <div class="stroke-box">
            <div class="stroke-box-title">🧮 ${t(sc.title)}</div>
            ${sc.rows.map(r => `
              <div class="stroke-row">
                <span>${t(r.label)}</span>
                <span class="stroke-val">${t(r.val)}</span>
              </div>`).join('')}
          </div>` : ''}

          <div class="section-label">${t(UI.steps)}</div>
          <ol class="steps">
            ${node.steps.map(s => `<li>${t(s)}</li>`).join('')}
          </ol>

          ${node.warning ? `
          <div class="warning-box">
            <span>⚠️</span><span>${t(node.warning)}</span>
          </div>` : ''}

          ${node.localRule ? `
          <div class="local-rule-box">
            <strong>📋 ${t(node.localRule.title)}</strong>
            ${t(node.localRule.desc)}
          </div>` : ''}

          <div class="btn-row">
            <button class="btn btn-secondary" onclick="goBack()">${t(UI.backShort)}</button>
            <button class="btn btn-primary" onclick="goHome()">${t(UI.homeBtn)}</button>
          </div>
        </div>
      </div>`;
  }
}

applyLangUI();
render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
